name: CI TaskFlow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: intall semgrep
        run: pip install semgrep
      
      - name: install gitleaks
        run: wget https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz
      - name: extract gitleaks
        run: tar -xvf gitleaks_8.30.0_linux_x64.tar.gz
      - name: move gitleaks to /usr/local/bin
        run: sudo mv gitleaks /usr/local/bin/
       
      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Run coverage
        run: npm run test:coverage

      - name: run semgrep
        run: semgrep scan --config=auto .

      - name: run security audit
        run: npm audit fix

      - name: run gitleaks
        run: gitleaks git -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
  
  cd:
    name: Continuous Deployment (Netlify)
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Installation des dépendances
        run: npm install

      - name: Build du projet
        run: npm run build

      - name: Installation Netlify CLI
        run: npm install -g netlify-cli

      - name: Déploiement sur Netlify
        run: |
          netlify deploy \
            --prod \
            --dir=dist \
            --auth=$NETLIFY_AUTH_TOKEN \
            --site=$NETLIFY_SITE_ID
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}